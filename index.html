<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Menu</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
    }

    /* ── SPLASH SCREEN ─────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      gap: 12px;
    }

    #splash.hidden {
      display: none;
    }

    .splash-logo {
      font-size: 64px;
      margin-bottom: 8px;
    }

    .splash-title {
      font-size: 32px;
      font-weight: bold;
      color: #f0a500;
      letter-spacing: 4px;
    }

    .splash-sub {
      font-size: 14px;
      color: #888;
      margin-bottom: 40px;
    }

    #start-btn {
      background: #f0a500;
      color: #111;
      border: none;
      padding: 18px 48px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(240,165,0,0.4); }
      50% { transform: scale(1.04); box-shadow: 0 0 0 14px rgba(240,165,0,0); }
    }

    /* ── MODEL VIEWER — FULLSCREEN ─────────────── */
    model-viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    /* ── AR OVERLAY — floats over camera ───────── */
    .ar-overlay {
      position: absolute;
      bottom: 110px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
      z-index: 10;
    }

    /* Item name pill */
    .ar-item-name {
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      padding: 8px 22px;
      border-radius: 30px;
      letter-spacing: 1px;
    }

    /* Price pill */
    .ar-item-price {
      background: rgba(240,165,0,0.85);
      color: #111;
      font-size: 15px;
      font-weight: bold;
      padding: 5px 18px;
      border-radius: 30px;
    }

    /* ── ALLERGEN BAR ───────────────────────────── */
    .ar-allergen-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      padding: 0 12px;
      max-width: 360px;
    }

    .ar-allergen-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
    }

    .ar-allergen-badge.contains {
      background: rgba(210, 40, 40, 0.88);
      color: #fff;
    }

    .ar-allergen-badge.free {
      background: rgba(30, 180, 80, 0.88);
      color: #fff;
    }

    /* ── SIZE BUTTONS ───────────────────────────── */
    .ar-size-row {
      display: flex;
      gap: 10px;
    }

    .ar-size-btn {
      background: rgba(0,0,0,0.6);
      color: #f0a500;
      border: 2px solid #f0a500;
      padding: 6px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.2s;
    }

    .ar-size-btn.active {
      background: #f0a500;
      color: #111;
    }

    /* ── NAV ROW ────────────────────────────────── */
    .ar-nav-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .arrow-btn {
      background: #f0a500;
      color: #111;
      border: none;
      border-radius: 50%;
      width: 52px;
      height: 52px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.1s;
    }

    .arrow-btn:active {
      transform: scale(0.88);
    }

    .dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transition: background 0.3s, transform 0.3s;
    }

    .dot.active {
      background: #f0a500;
      transform: scale(1.4);
    }

    /* ── INGREDIENTS BUTTON ─────────────────────── */
    #ar-ingredients-btn {
      background: rgba(0,0,0,0.65);
      border: 2px solid #f0a500;
      color: #f0a500;
      padding: 10px 28px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      pointer-events: auto;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    #ar-ingredients-btn:active {
      background: #f0a500;
      color: #111;
    }

    /* ── INGREDIENTS PANEL — fixed over AR ──────── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 9998;
    }

    #ingredients-panel {
      position: fixed;
      bottom: -100%;
      left: 0;
      right: 0;
      background: #1a1a1a;
      border-radius: 28px 28px 0 0;
      padding: 28px 22px 36px;
      z-index: 9999;
      transition: bottom 0.4s ease;
      max-height: 75vh;
      overflow-y: auto;
    }

    #ingredients-panel.open {
      bottom: 0;
    }

    .panel-handle {
      width: 40px;
      height: 4px;
      background: #444;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    #panel-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 4px;
      color: #fff;
    }

    #panel-subtitle {
      font-size: 12px;
      color: #666;
      margin-bottom: 20px;
    }

    .panel-section-title {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    .panel-allergen-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 22px;
    }

    .panel-allergen-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
    }

    .panel-allergen-badge.contains {
      background: rgba(210,40,40,0.2);
      border: 1px solid #dc3232;
      color: #ff6b6b;
    }

    .panel-allergen-badge.free {
      background: rgba(30,180,80,0.15);
      border: 1px solid #32c864;
      color: #5fdd9d;
    }

    .ingredient-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }

    .ingredient-tag {
      background: #2a2a2a;
      border: 1px solid #333;
      color: #ddd;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
    }

    #close-btn {
      width: 100%;
      background: #f0a500;
      color: #111;
      border: none;
      padding: 15px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #close-btn:active {
      background: #ffbf00;
    }
  </style>
</head>

<body>

  <!-- ── SPLASH ──────────────────────────────────── -->
  <div id="splash">
    <div class="splash-logo">🍽️</div>
    <div class="splash-title">AR MENU</div>
    <div class="splash-sub">Point your phone at any flat surface</div>
    <button id="start-btn" onclick="startAR()">TAP TO START AR</button>
  </div>

  <!-- ── MODEL VIEWER ────────────────────────────── -->
  <model-viewer
    id="viewer"
    src="https://raw.githubusercontent.com/gargsuhani/ar-menu/main/pizza2.glb"
    alt="Food item"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
  >
    <!-- ── EVERYTHING inside here shows in AR ────── -->
    <div class="ar-overlay" slot="default">

      <!-- Name + Price -->
      <div class="ar-item-name" id="ar-item-name">Margherita Pizza</div>
      <div class="ar-item-price" id="ar-item-price">₹299</div>

      <!-- Allergen bar -->
      <div class="ar-allergen-bar" id="ar-allergen-bar"></div>

      <!-- Size buttons -->
      <div class="ar-size-row">
        <button class="ar-size-btn active" onclick="setSize('small', this)">S</button>
        <button class="ar-size-btn" onclick="setSize('medium', this)">M</button>
        <button class="ar-size-btn" onclick="setSize('large', this)">L</button>
      </div>

      <!-- Arrows + dots -->
      <div class="ar-nav-row">
        <button class="arrow-btn" onclick="navigate(-1)">←</button>
        <div class="dots" id="dots"></div>
        <button class="arrow-btn" onclick="navigate(1)">→</button>
      </div>

      <!-- Ingredients button -->
      <button id="ar-ingredients-btn" onclick="openPanel()">🧾 Ingredients</button>

    </div>
  </model-viewer>

  <!-- ── INGREDIENTS PANEL — fixed, shows over AR ── -->
  <div id="overlay" onclick="closePanel()"></div>

  <div id="ingredients-panel">
    <div class="panel-handle"></div>
    <div id="panel-title">Margherita Pizza</div>
    <div id="panel-subtitle">Tap outside to close</div>

    <div class="panel-section-title">⚠️ Allergens</div>
    <div class="panel-allergen-row" id="panel-allergen-row"></div>

    <div class="panel-section-title">🧄 Ingredients</div>
    <div class="ingredient-list" id="ingredient-list"></div>

    <button id="close-btn" onclick="closePanel()">Close</button>
  </div>

  <script>
    // ── ALLERGEN MASTER LIST ──────────────────────
    const ALL_ALLERGENS = [
      { key: "gluten",  icon: "🌾", label: "Gluten"  },
      { key: "dairy",   icon: "🥛", label: "Dairy"   },
      { key: "nuts",    icon: "🥜", label: "Nuts"    },
      { key: "eggs",    icon: "🥚", label: "Eggs"    },
      { key: "soy",     icon: "🫘", label: "Soy"     }
    ];

    // ── SIZE SCALE VALUES ─────────────────────────
    const SIZES = {
      small:  "0.6 0.6 0.6",
      medium: "1 1 1",
      large:  "1.5 1.5 1.5"
    };

    // ── MENU DATA ─────────────────────────────────
    const menuItems = [
      {
        name: "Margherita Pizza",
        price: "₹299",
        model: "pizza2.glb",
        ingredients: ["Tomato Sauce", "Mozzarella", "Fresh Basil", "Olive Oil", "Pizza Dough"],
        allergens: ["gluten", "dairy"]
      },
      {
        name: "Garden Fresh",
        price: "₹399",
        model: "pizza.glb",
        ingredients: ["Bell Peppers", "Mushrooms", "Onion", "Mozzarella", "Olive Oil", "Pizza Dough"],
        allergens: ["gluten", "dairy", "nuts", "soy"]
      },
      {
        name: "Pepperoni Pizza",
        price: "₹449",
        model: "pizza1.glb",
        ingredients: ["Pepperoni", "Olive", "Onion", "Mozzarella", "Tomato Sauce", "Olive Oil", "Pizza Dough"],
        allergens: ["gluten", "dairy", "soy"]
      },
      {
        name: "Chicken Pizza",
        price: "₹499",
        model: "pizza3.glb",
        ingredients: ["Chicken", "Mozzarella", "Tomato Sauce", "Olive Oil", "Pizza Dough"],
        allergens: ["gluten", "dairy"]
      }
    ];

    const BASE_URL = "https://raw.githubusercontent.com/gargsuhani/ar-menu/main/";
    let current = 0;

    // ── START AR ──────────────────────────────────
    function startAR() {
      document.getElementById("splash").classList.add("hidden");
      const viewer = document.getElementById("viewer");

      if (viewer.loaded) {
        viewer.activateAR();
      } else {
        viewer.addEventListener("load", () => {
          viewer.activateAR();
        }, { once: true });
      }
    }

    // ── BUILD DOTS ────────────────────────────────
    const dotsContainer = document.getElementById("dots");
    menuItems.forEach((_, i) => {
      const dot = document.createElement("div");
      dot.className = "dot" + (i === 0 ? " active" : "");
      dot.id = "dot-" + i;
      dotsContainer.appendChild(dot);
    });

    // ── BUILD ALLERGEN BAR ────────────────────────
    function buildAllergenBar(containerId, itemAllergens, panelStyle = false) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      ALL_ALLERGENS.forEach(a => {
        const contains = itemAllergens.includes(a.key);
        const badge = document.createElement("div");
        badge.className = (panelStyle ? "panel-allergen-badge" : "ar-allergen-badge") +
                          (contains ? " contains" : " free");
        badge.innerHTML = `${a.icon} ${a.label}`;
        container.appendChild(badge);
      });
    }

    // ── NAVIGATE ──────────────────────────────────
    function navigate(direction) {
      current = (current + direction + menuItems.length) % menuItems.length;
      updateDisplay();
    }

    // ── UPDATE DISPLAY ────────────────────────────
    function updateDisplay() {
      const item = menuItems[current];
      const viewer = document.getElementById("viewer");

      // Swap model
      viewer.src = BASE_URL + item.model;

      // Update text
      document.getElementById("ar-item-name").textContent = item.name;
      document.getElementById("ar-item-price").textContent = item.price;

      // Update dots
      menuItems.forEach((_, i) => {
        const dot = document.getElementById("dot-" + i);
        if (dot) dot.classList.toggle("active", i === current);
      });

      // Update allergen bar
      buildAllergenBar("ar-allergen-bar", item.allergens, false);
    }

    // ── SIZE SELECTOR ─────────────────────────────
    function setSize(size, btn) {
      document.getElementById("viewer").scale = SIZES[size];
      document.querySelectorAll(".ar-size-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    // ── OPEN PANEL ────────────────────────────────
    function openPanel() {
      const item = menuItems[current];

      // Populate ingredients
      const list = document.getElementById("ingredient-list");
      list.innerHTML = "";
      item.ingredients.forEach(ing => {
        const tag = document.createElement("div");
        tag.className = "ingredient-tag";
        tag.textContent = ing;
        list.appendChild(tag);
      });

      // Populate allergens in panel
      buildAllergenBar("panel-allergen-row", item.allergens, true);

      document.getElementById("panel-title").textContent = item.name;
      document.getElementById("ingredients-panel").classList.add("open");
      document.getElementById("overlay").style.display = "block";
    }

    // ── CLOSE PANEL ───────────────────────────────
    function closePanel() {
      document.getElementById("ingredients-panel").classList.remove("open");
      document.getElementById("overlay").style.display = "none";
    }

    // ── INIT ──────────────────────────────────────
    buildAllergenBar("ar-allergen-bar", menuItems[0].allergens, false);

  </script>

</body>
</html>
