<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Menu</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
      color: white;
      overflow: hidden;
    }

    #item-name {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    #item-price {
      font-size: 18px;
      color: #f0a500;
      margin-bottom: 16px;
    }

    model-viewer {
      width: 320px;
      height: 320px;
      position: relative;
    }

    .nav-row {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-top: 16px;
    }

    .arrow-btn {
      background: #f0a500;
      color: #111;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 22px;
      cursor: pointer;
      font-weight: bold;
      z-index: 999;
    }

    .arrow-btn:hover { background: #ffbf00; }

    .dots { display: flex; gap: 8px; }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }

    .dot.active { background: #f0a500; }

    /* Normal view ingredients button */
    #ingredients-btn {
      margin-top: 20px;
      background: transparent;
      border: 2px solid #f0a500;
      color: #f0a500;
      padding: 10px 28px;
      border-radius: 25px;
      font-size: 15px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s;
    }

    #ingredients-btn:hover { background: #f0a500; color: #111; }

    /* AR overlay — floats over camera */
    .ar-overlay {
      position: absolute;
      bottom: 80px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
      z-index: 999;
    }

    .ar-item-name {
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 18px;
      font-weight: bold;
      padding: 8px 20px;
      border-radius: 20px;
    }

    .ar-nav-row {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    /* AR ingredients button */
    #ar-ingredients-btn {
      background: transparent;
      border: 2px solid #f0a500;
      color: #f0a500;
      padding: 8px 22px;
      border-radius: 25px;
      font-size: 14px;
      cursor: pointer;
      pointer-events: auto;
    }

    /* Ingredients panel — works in both normal and AR */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
    }

    #ingredients-panel {
      position: fixed;
      bottom: -100%;
      left: 0;
      right: 0;
      background: #1e1e1e;
      border-radius: 24px 24px 0 0;
      padding: 28px 24px;
      z-index: 200;
      transition: bottom 0.4s ease;
    }

    #ingredients-panel.open { bottom: 0; }

    #panel-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    #panel-subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }

    .ingredient-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    .ingredient-tag {
      background: #2a2a2a;
      border: 1px solid #333;
      color: #eee;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
    }

    #close-btn {
      width: 100%;
      background: #f0a500;
      color: #111;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #close-btn:hover { background: #ffbf00; }
  </style>
</head>

<body>

  <div id="item-name">Margherita Pizza</div>
  <div id="item-price">₹299</div>

  <model-viewer
    id="viewer"
    src="https://raw.githubusercontent.com/gargsuhani/ar-menu/main/pizza.glb"
    alt="Food item"
    auto-rotate
    camera-controls
    ar
    ar-modes="webxr scene-viewer quick-look"
  >
    <!-- Everything inside here shows in AR mode -->
    <div class="ar-overlay" slot="default">
      <div class="ar-item-name" id="ar-item-name">Margherita Pizza</div>
      <div class="ar-nav-row">
        <button class="arrow-btn" onclick="navigate(-1)">←</button>
        <div class="dots" id="ar-dots"></div>
        <button class="arrow-btn" onclick="navigate(1)">→</button>
      </div>
      <button id="ar-ingredients-btn" onclick="openPanel()">🧾 Ingredients</button>
    </div>
  </model-viewer>

  <!-- Normal view controls -->
  <div class="nav-row">
    <button class="arrow-btn" onclick="navigate(-1)">←</button>
    <div class="dots" id="dots"></div>
    <button class="arrow-btn" onclick="navigate(1)">→</button>
  </div>
  <button id="ingredients-btn" onclick="openPanel()">🧾 View Ingredients</button>

  <!-- Overlay + panel — fixed position works in both normal and AR -->
  <div id="overlay" onclick="closePanel()"></div>

  <div id="ingredients-panel">
    <div id="panel-title">Ingredients</div>
    <div id="panel-subtitle">Tap anywhere outside to close</div>
    <div class="ingredient-list" id="ingredient-list"></div>
    <button id="close-btn" onclick="closePanel()">Close</button>
  </div>

  <script>
   const menuItems = [
      {
        name: "Margherita Pizza",
        price: "₹299",
        model: "pizza2.glb",
        ingredients: ["Tomato Sauce", "Mozzarella", "Fresh Basil", "Olive Oil", "Pizza Dough"]
      },
      {
        name: "Garden Fresh",
        price: "₹399",
        model: "pizza.glb",
        ingredients: ["Beef Patty", "Cheddar Cheese", "Lettuce", "Tomato", "Olive Oil", "Pizza Dough"]
      },
      {
        name: "Pepperoni Pizza",
        price: "₹449",
        model: "pizza1.glb",
        ingredients: ["Pepperoni", "Olive", "Onion", "Mozzarella", "Tomato Sauce", "Olive Oil", "Pizza Dough"]
      },
      {
        name: "Chicken Pizza",
        price: "₹499",
        model: "pizza3.glb",
        ingredients: ["Chicken ", "Mozzarella", "Tomato Sauce", "Olive Oil", "Pizza Dough"]
      }
    ];
    const BASE_URL = "https://raw.githubusercontent.com/gargsuhani/ar-menu/main/";
    let current = 0;

    // Build dots for both views
    function buildDots(containerId) {
      const container = document.getElementById(containerId);
      menuItems.forEach((_, i) => {
        const dot = document.createElement("div");
        dot.className = "dot" + (i === 0 ? " active" : "");
        dot.id = containerId + "-dot-" + i;
        container.appendChild(dot);
      });
    }

    buildDots("dots");
    buildDots("ar-dots");

    function navigate(direction) {
      current = (current + direction + menuItems.length) % menuItems.length;
      updateDisplay();
    }

    function updateDisplay() {
      const item = menuItems[current];
      document.getElementById("viewer").src = BASE_URL + item.model;
      document.getElementById("item-name").textContent = item.name;
      document.getElementById("item-price").textContent = item.price;
      document.getElementById("ar-item-name").textContent = item.name;

      menuItems.forEach((_, i) => {
        const dot = document.getElementById("dots-dot-" + i);
        const arDot = document.getElementById("ar-dots-dot-" + i);
        if (dot) dot.classList.toggle("active", i === current);
        if (arDot) arDot.classList.toggle("active", i === current);
      });
    }

    function openPanel() {
      const item = menuItems[current];
      const list = document.getElementById("ingredient-list");
      list.innerHTML = "";
      item.ingredients.forEach(ing => {
        const tag = document.createElement("div");
        tag.className = "ingredient-tag";
        tag.textContent = ing;
        list.appendChild(tag);
      });
      document.getElementById("panel-title").textContent = item.name + " — Ingredients";
      document.getElementById("ingredients-panel").classList.add("open");
      document.getElementById("overlay").style.display = "block";
    }

    function closePanel() {
      document.getElementById("ingredients-panel").classList.remove("open");
      document.getElementById("overlay").style.display = "none";
    }
  </script>

</body>
</html>
