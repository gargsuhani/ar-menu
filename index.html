<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Menu</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
      color: white;
      overflow: hidden;
    }

    #item-name {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    #item-price {
      font-size: 18px;
      color: #f0a500;
      margin-bottom: 10px;
    }

    /* Allergen bar — normal view */
    .allergen-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      max-width: 320px;
    }

    .allergen-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .allergen-badge.contains {
      background: rgba(220, 50, 50, 0.2);
      border: 1px solid #dc3232;
      color: #ff6b6b;
    }

    .allergen-badge.free {
      background: rgba(50, 200, 100, 0.2);
      border: 1px solid #32c864;
      color: #5fdd9d;
    }

    model-viewer {
      width: 320px;
      height: 280px;
      position: relative;
    }

    .nav-row {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-top: 12px;
    }

    .arrow-btn {
      background: #f0a500;
      color: #111;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 22px;
      cursor: pointer;
      font-weight: bold;
      z-index: 999;
    }

    .arrow-btn:hover { background: #ffbf00; }

    .dots { display: flex; gap: 8px; }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }

    .dot.active { background: #f0a500; }

    #ingredients-btn {
      margin-top: 14px;
      background: transparent;
      border: 2px solid #f0a500;
      color: #f0a500;
      padding: 10px 28px;
      border-radius: 25px;
      font-size: 15px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s;
    }

    #ingredients-btn:hover { background: #f0a500; color: #111; }

    /* AR overlay */
    .ar-overlay {
      position: absolute;
      bottom: 80px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
      z-index: 999;
    }

    .ar-item-name {
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 18px;
      font-weight: bold;
      padding: 8px 20px;
      border-radius: 20px;
    }

    /* Allergen bar inside AR */
    .ar-allergen-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      max-width: 320px;
      padding: 0 10px;
    }

    .ar-allergen-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
    }

    .ar-allergen-badge.contains {
      background: rgba(220, 50, 50, 0.85);
      color: white;
    }

    .ar-allergen-badge.free {
      background: rgba(50, 200, 100, 0.85);
      color: white;
    }

    .ar-nav-row {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    #ar-ingredients-btn {
      background: transparent;
      border: 2px solid #f0a500;
      color: #f0a500;
      padding: 8px 22px;
      border-radius: 25px;
      font-size: 14px;
      cursor: pointer;
      pointer-events: auto;
    }

    /* Ingredients panel */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
    }

    #ingredients-panel {
      position: fixed;
      bottom: -100%;
      left: 0;
      right: 0;
      background: #1e1e1e;
      border-radius: 24px 24px 0 0;
      padding: 28px 24px;
      z-index: 200;
      transition: bottom 0.4s ease;
    }

    #ingredients-panel.open { bottom: 0; }

    #panel-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    #panel-subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }

    /* Allergens inside panel */
    .panel-allergen-section {
      margin-bottom: 16px;
    }

    .panel-allergen-title {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .panel-allergen-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .ingredient-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    .ingredient-tag {
      background: #2a2a2a;
      border: 1px solid #333;
      color: #eee;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
    }

    #close-btn {
      width: 100%;
      background: #f0a500;
      color: #111;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #close-btn:hover { background: #ffbf00; }
  </style>
</head>

<body>

  <div id="item-name">Margherita Pizza</div>
  <div id="item-price">₹299</div>

  <!-- Allergen bar normal view -->
  <div class="allergen-bar" id="allergen-bar"></div>

  <model-viewer
    id="viewer"
    src="https://raw.githubusercontent.com/gargsuhani/ar-menu/main/pizza.glb"
    alt="Food item"
    auto-rotate
    camera-controls
    ar
    ar-modes="webxr scene-viewer quick-look"
  >
    <div class="ar-overlay" slot="default">
      <div class="ar-item-name" id="ar-item-name">Margherita Pizza</div>

      <!-- Allergen bar AR view -->
      <div class="ar-allergen-bar" id="ar-allergen-bar"></div>

      <div class="ar-nav-row">
        <button class="arrow-btn" onclick="navigate(-1)">←</button>
        <div class="dots" id="ar-dots"></div>
        <button class="arrow-btn" onclick="navigate(1)">→</button>
      </div>
      <button id="ar-ingredients-btn" onclick="openPanel()">🧾 Ingredients</button>
    </div>
  </model-viewer>

  <div class="nav-row">
    <button class="arrow-btn" onclick="navigate(-1)">←</button>
    <div class="dots" id="dots"></div>
    <button class="arrow-btn" onclick="navigate(1)">→</button>
  </div>

  <button id="ingredients-btn" onclick="openPanel()">🧾 View Ingredients</button>

  <div id="overlay" onclick="closePanel()"></div>

  <div id="ingredients-panel">
    <div id="panel-title">Ingredients</div>
    <div id="panel-subtitle">Tap outside to close</div>

    <!-- Allergens inside panel -->
    <div class="panel-allergen-section">
      <div class="panel-allergen-title">⚠️ Allergens</div>
      <div class="panel-allergen-row" id="panel-allergen-row"></div>
    </div>

    <div class="panel-allergen-title">🧄 Ingredients</div>
    <div class="ingredient-list" id="ingredient-list"></div>
    <button id="close-btn" onclick="closePanel()">Close</button>
  </div>

  <script>
    // All possible allergens with icons
    const ALL_ALLERGENS = [
      { key: "gluten",    icon: "🌾", label: "Gluten"    },
      { key: "dairy",     icon: "🥛", label: "Dairy"     },
      { key: "nuts",      icon: "🥜", label: "Nuts"      },
      { key: "eggs",      icon: "🥚", label: "Eggs"      },
      { key: "soy",       icon: "🫘", label: "Soy"       },
      { key: "seafood",   icon: "🦐", label: "Seafood"   },
      { key: "fish",      icon: "🐟", label: "Fish"      }
    ];

    const menuItems = [
      {
        name: "Margherita Pizza",
        price: "₹299",
        model: "pizza.glb",
        ingredients: ["Tomato Sauce", "Mozzarella", "Fresh Basil", "Olive Oil", "Pizza Dough"],
        allergens: ["gluten", "dairy"]
      },
      {
        name: "Classic Burger",
        price: "₹199",
        model: "burger.glb",
        ingredients: ["Beef Patty", "Cheddar Cheese", "Lettuce", "Tomato", "Pickles", "Brioche Bun", "Special Sauce"],
        allergens: ["gluten", "dairy", "eggs"]
      },
      {
        name: "Pasta Arrabbiata",
        price: "₹249",
        model: "pasta.glb",
        ingredients: ["Penne Pasta", "Tomato", "Garlic", "Red Chilli", "Olive Oil", "Parsley"],
        allergens: ["gluten"]
      },
      {
        name: "Sushi Platter",
        price: "₹399",
        model: "sushi.glb",
        ingredients: ["Sushi Rice", "Nori", "Salmon", "Tuna", "Avocado", "Soy Sauce", "Wasabi", "Ginger"],
        allergens: ["fish", "seafood", "soy"]
      }
    ];

    const BASE_URL = "https://raw.githubusercontent.com/gargsuhani/ar-menu/main/";
    let current = 0;

    // Build dots
    function buildDots(containerId) {
      const container = document.getElementById(containerId);
      menuItems.forEach((_, i) => {
        const dot = document.createElement("div");
        dot.className = "dot" + (i === 0 ? " active" : "");
        dot.id = containerId + "-dot-" + i;
        container.appendChild(dot);
      });
    }

    buildDots("dots");
    buildDots("ar-dots");

    // Build allergen badges for a container
    function buildAllergenBar(containerId, itemAllergens, small = false) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      ALL_ALLERGENS.forEach(a => {
        const contains = itemAllergens.includes(a.key);
        const badge = document.createElement("div");
        badge.className = (small ? "ar-allergen-badge" : "allergen-badge") + (contains ? " contains" : " free");
        badge.innerHTML = `${a.icon} ${a.label}`;
        container.appendChild(badge);
      });
    }

    function navigate(direction) {
      current = (current + direction + menuItems.length) % menuItems.length;
      updateDisplay();
    }

    function updateDisplay() {
      const item = menuItems[current];

      document.getElementById("viewer").src = BASE_URL + item.model;
      document.getElementById("item-name").textContent = item.name;
      document.getElementById("item-price").textContent = item.price;
      document.getElementById("ar-item-name").textContent = item.name;

      // Update dots
      menuItems.forEach((_, i) => {
        const dot = document.getElementById("dots-dot-" + i);
        const arDot = document.getElementById("ar-dots-dot-" + i);
        if (dot) dot.classList.toggle("active", i === current);
        if (arDot) arDot.classList.toggle("active", i === current);
      });

      // Update allergen bars
      buildAllergenBar("allergen-bar", item.allergens, false);
      buildAllergenBar("ar-allergen-bar", item.allergens, true);
    }

    function openPanel() {
      const item = menuItems[current];

      // Ingredients
      const list = document.getElementById("ingredient-list");
      list.innerHTML = "";
      item.ingredients.forEach(ing => {
        const tag = document.createElement("div");
        tag.className = "ingredient-tag";
        tag.textContent = ing;
        list.appendChild(tag);
      });

      // Allergens inside panel
      buildAllergenBar("panel-allergen-row", item.allergens, false);

      document.getElementById("panel-title").textContent = item.name;
      document.getElementById("ingredients-panel").classList.add("open");
      document.getElementById("overlay").style.display = "block";
    }

    function closePanel() {
      document.getElementById("ingredients-panel").classList.remove("open");
      document.getElementById("overlay").style.display = "none";
    }

    // Init
    buildAllergenBar("allergen-bar", menuItems[0].allergens, false);
    buildAllergenBar("ar-allergen-bar", menuItems[0].allergens, true);
  </script>

</body>
</html>
